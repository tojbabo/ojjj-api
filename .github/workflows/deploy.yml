name: CI/CD Pipeline

on:
  push:
    branches: [main]  # main 브랜치에 push할 때만 실행

jobs:
  deploy:
      runs-on: ubuntu-latest
      steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-node@v4
            with: 
              node-version: 24
          - run: npm install
          - run: npm run lint
          - run: npm run test
          - run: npm run build


